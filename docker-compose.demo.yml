services:
  mymemex-demo:
    build: .
    image: mymemex:demo
    container_name: mymemex-demo
    ports:
      - "8001:8000"
    environment:
      - DEMO_MODE=true
      - MYMEMEX_DATABASE__PATH=/var/lib/mymemex/demo.db
      - MYMEMEX_LLM__PROVIDER=none
      - MYMEMEX_AI__SEMANTIC_SEARCH_ENABLED=false
    volumes:
      - demo_data:/var/lib/mymemex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  demo_data:
