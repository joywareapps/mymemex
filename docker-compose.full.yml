version: "3.8"

services:
  librarian:
    image: ghcr.io/joywareapps/librarian:latest
    build: .
    container_name: librarian
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - librarian-data:/var/lib/librarian
      - ${DOCUMENTS_PATH:-~/Documents}:/mnt/documents:ro
    environment:
      - LIBRARIAN_CONFIG=/app/config/config.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    env_file:
      - path: .env
        required: false
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: librarian-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  librarian-data:
  ollama-models:
