# MyMemex Configuration
# Copy to config.yaml and customize

debug: false
log_level: INFO

# Directories to watch for new documents
watch:
  directories:
    - ~/Documents  # Change to your document path
  file_patterns:
    - "*.pdf"
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.tiff"
    - "*.tif"
    - "*.bmp"
    - "*.webp"
  ignore_patterns:
    - "*/.*"
    - "*/.Trash-*"
    - "*/@eaDir/*"
    - "*/#recycle/*"
  debounce_seconds: 2.0
  max_file_size_mb: 100

database:
  path: ~/.local/share/mymemex/mymemex.db

server:
  host: 0.0.0.0
  port: 8000

ocr:
  enabled: false  # Enable for scanned documents
  language: eng
  dpi: 300

# LLM provider for classification and extraction
# Option 1: Ollama (local, no API key needed)
#llm:
#  provider: ollama
#  model: llama3.2
#  api_base: http://localhost:11434

# Option 2: OpenAI (set OPENAI_API_KEY env var or api_key below)
#llm:
#  provider: openai
#  model: gpt-4o-mini
#  api_key: sk-...  # Or use OPENAI_API_KEY env var

# Option 3: Anthropic (set ANTHROPIC_API_KEY env var or api_key below)
#llm:
#  provider: anthropic
#  model: claude-haiku-4-5-20251001
#  api_key: sk-ant-...  # Or use ANTHROPIC_API_KEY env var

llm:
  provider: none  # Set to ollama, openai, or anthropic

classification:
  enabled: true
  confidence_threshold: 0.7
  max_tags: 5

extraction:
  enabled: true
  min_confidence: 0.5

ingestion:
  max_concurrent: 2

ai:
  semantic_search_enabled: false
  embedding_model: nomic-embed-text
  embedding_batch_size: 8

mcp:
  enabled: true
