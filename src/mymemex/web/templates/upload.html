{% extends "base.html" %}
{% block title %}Upload — MyMemex{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Upload Documents</h1>

<div x-data="{
    files: [],
    uploading: false,
    results: [],
    dragOver: false,

    addFiles(fileList) {
        for (const f of fileList) {
            if (!this.files.some(x => x.name === f.name && x.size === f.size)) {
                this.files.push(f);
            }
        }
    },

    removeFile(index) {
        this.files.splice(index, 1);
    },

    formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    },

    async uploadAll() {
        this.uploading = true;
        this.results = [];
        for (const file of this.files) {
            const fd = new FormData();
            fd.append('file', file);
            try {
                const resp = await fetch('/api/v1/documents/upload', { method: 'POST', body: fd });
                const data = await resp.json();
                this.results.push({ name: file.name, ok: resp.ok, message: resp.ok ? 'Uploaded' : (data.detail || 'Failed') });
            } catch (e) {
                this.results.push({ name: file.name, ok: false, message: e.message });
            }
        }
        this.files = [];
        this.uploading = false;
    }
}">

    <!-- Drop Zone -->
    <div class="drop-zone bg-white dark:bg-gray-800 rounded-lg p-12 text-center transition-colors duration-200"
         :class="{ 'drag-over': dragOver }"
         @dragover.prevent="dragOver = true"
         @dragleave.prevent="dragOver = false"
         @drop.prevent="dragOver = false; addFiles($event.dataTransfer.files)">
        <svg class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <p class="mt-4 text-sm text-gray-600 dark:text-gray-400">Drag & drop files here, or</p>
        <label class="mt-2 inline-block px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md text-sm font-medium text-gray-700 dark:text-gray-200 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors duration-200">
            Browse files
            <input type="file" multiple class="hidden" @change="addFiles($event.target.files); $event.target.value = ''">
        </label>
    </div>

    <!-- File List -->
    <template x-if="files.length > 0">
        <div class="mt-6">
            <h2 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">Selected files</h2>
            <ul class="space-y-2">
                <template x-for="(file, index) in files" :key="file.name + file.size">
                    <li class="flex items-center justify-between bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md px-4 py-2 transition-colors duration-200">
                        <div>
                            <span class="text-sm text-gray-900 dark:text-gray-100" x-text="file.name"></span>
                            <span class="text-xs text-gray-500 dark:text-gray-400 ml-2" x-text="formatSize(file.size)"></span>
                        </div>
                        <button @click="removeFile(index)" class="text-gray-400 hover:text-red-600 dark:hover:text-red-400 text-sm">&times;</button>
                    </li>
                </template>
            </ul>
            <button @click="uploadAll()" :disabled="uploading"
                    class="mt-4 px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 disabled:opacity-50 transition-colors duration-200">
                <span x-show="!uploading">Upload <span x-text="files.length"></span> file(s)</span>
                <span x-show="uploading">Uploading...</span>
            </button>
        </div>
    </template>

    <!-- Upload Results -->
    <template x-if="results.length > 0">
        <div class="mt-6">
            <h2 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">Results</h2>
            <ul class="space-y-2">
                <template x-for="r in results" :key="r.name">
                    <li class="flex items-center gap-2 text-sm">
                        <span x-show="r.ok" class="text-green-600 dark:text-green-400">&#10003;</span>
                        <span x-show="!r.ok" class="text-red-600 dark:text-red-400">&#10007;</span>
                        <span x-text="r.name" class="text-gray-900 dark:text-gray-100"></span>
                        <span x-text="r.message" class="text-gray-500 dark:text-gray-400"></span>
                    </li>
                </template>
            </ul>
            <a href="/ui/" class="mt-4 inline-block text-sm text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition-colors duration-200">View documents &rarr;</a>
        </div>
    </template>
</div>
{% endblock %}
