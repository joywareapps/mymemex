{% extends "base.html" %}
{% block title %}MCP — Admin — MyMemex{% endblock %}

{% block content %}
<div x-data="{
    tokens: [],
    showModal: false,
    newTokenName: '',
    createdToken: null,
    loading: false,
    async load() {
        const r = await fetch('/api/v1/admin/mcp/tokens');
        const d = await r.json();
        this.tokens = d.tokens;
    },
    async generate() {
        if (!this.newTokenName) return;
        this.loading = true;
        const r = await fetch('/api/v1/admin/mcp/tokens', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: this.newTokenName})
        });
        this.loading = false;
        if (r.ok) {
            this.createdToken = await r.json();
            this.newTokenName = '';
            await this.load();
        }
    },
    async revoke(id) {
        if (!confirm('Revoke this token?')) return;
        await fetch('/api/v1/admin/mcp/tokens/' + id, {method: 'DELETE'});
        await this.load();
    },
    copyToken() {
        navigator.clipboard.writeText(this.createdToken.token);
    }
}" x-init="load()">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">MCP Tokens</h1>
        <button @click="showModal = true"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm transition-colors">
            + Generate Token
        </button>
    </div>

    <!-- One-time token display -->
    <div x-show="createdToken" class="mb-6 p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-700 rounded-lg">
        <p class="text-sm font-medium text-green-800 dark:text-green-300 mb-2">
            Token created! Copy it now — it won't be shown again.
        </p>
        <div class="flex items-center gap-2">
            <code class="flex-1 font-mono text-sm bg-white dark:bg-gray-800 px-3 py-2 rounded border border-green-200 text-gray-900 dark:text-gray-100 break-all"
                  x-text="createdToken?.token"></code>
            <button @click="copyToken()"
                    class="px-3 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 text-sm whitespace-nowrap">
                Copy
            </button>
        </div>
        <button @click="createdToken = null" class="mt-2 text-xs text-green-700 dark:text-green-400 hover:underline">
            Dismiss
        </button>
    </div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-900">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Prefix</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Last Used</th>
                    <th class="px-6 py-3"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                <template x-for="t in tokens" :key="t.id">
                    <tr>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900 dark:text-white" x-text="t.name"></td>
                        <td class="px-6 py-4 text-sm font-mono text-gray-500 dark:text-gray-400" x-text="t.token_prefix + '…'"></td>
                        <td class="px-6 py-4">
                            <span :class="t.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-500'"
                                  class="px-2 py-1 rounded-full text-xs font-medium"
                                  x-text="t.is_active ? 'Active' : 'Revoked'"></span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400"
                            x-text="t.last_used_at ? new Date(t.last_used_at).toLocaleString() : 'Never'"></td>
                        <td class="px-6 py-4 text-right">
                            <button x-show="t.is_active" @click="revoke(t.id)"
                                    class="text-red-600 hover:underline text-sm">Revoke</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="tokens.length === 0">
                    <td colspan="5" class="px-6 py-8 text-center text-gray-500">No tokens yet.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Generate modal -->
    <div x-show="showModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md shadow-xl">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Generate New Token</h2>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Token Name</label>
                <input x-model="newTokenName" type="text" placeholder="e.g. Claude Desktop"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-3 mt-4">
                <button @click="generate(); showModal = false" :disabled="!newTokenName || loading"
                        class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 transition-colors">
                    Generate
                </button>
                <button @click="showModal = false"
                        class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
