{% extends "base.html" %}
{% block title %}Queue — Admin — MyMemex{% endblock %}

{% block content %}

<!-- Processing Engine Status Card -->
<div x-data="{
    engine: {paused: false, paused_until: null, paused_at: null, ai_tasks_pending: 0},
    dropdownOpen: false,
    async loadEngine() {
        const r = await fetch('/api/v1/admin/processing/status');
        if (r.ok) this.engine = await r.json();
    },
    async pause(minutes) {
        this.dropdownOpen = false;
        const body = minutes ? {minutes} : {};
        await fetch('/api/v1/admin/processing/pause', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        await this.loadEngine();
    },
    async resume() {
        await fetch('/api/v1/admin/processing/resume', {method: 'POST'});
        await this.loadEngine();
    },
    timeRemaining() {
        if (!this.engine.paused_until) return 'until resumed';
        const ms = new Date(this.engine.paused_until) - new Date();
        if (ms <= 0) return 'expiring\u2026';
        const m = Math.floor(ms / 60000);
        const h = Math.floor(m / 60);
        if (h >= 1) return h + 'h ' + (m % 60) + 'm';
        return m + 'm';
    }
}" x-init="loadEngine()" class="mb-6">

    <!-- Active state -->
    <div x-show="!engine.paused" class="flex items-center justify-between bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 shadow-sm">
        <div class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
            <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
            <span>AI processing active</span>
        </div>
        <div class="relative">
            <button @click="dropdownOpen = !dropdownOpen"
                    class="flex items-center gap-1 px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-gray-700 dark:text-gray-300">
                Pause
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            <div x-show="dropdownOpen" @click.outside="dropdownOpen = false"
                 class="absolute right-0 mt-1 w-40 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-md shadow-lg z-10 py-1">
                <button @click="pause(15)"  class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">15 minutes</button>
                <button @click="pause(60)"  class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">1 hour</button>
                <button @click="pause(240)" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">4 hours</button>
                <button @click="pause(480)" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">8 hours</button>
                <div class="border-t border-gray-200 dark:border-gray-600 my-1"></div>
                <button @click="pause(null)" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">Until resumed</button>
            </div>
        </div>
    </div>

    <!-- Paused state -->
    <div x-show="engine.paused" class="flex items-center justify-between bg-amber-50 dark:bg-amber-900/20 border border-amber-300 dark:border-amber-700 rounded-lg px-4 py-3 shadow-sm">
        <div class="flex items-center gap-2 text-sm text-amber-800 dark:text-amber-300">
            <span class="text-base">&#9646;&#9646;</span>
            <span>
                AI processing paused &middot;
                <span x-text="timeRemaining()"></span>
                <span x-show="engine.ai_tasks_pending > 0">
                    (<span x-text="engine.ai_tasks_pending"></span> task<span x-show="engine.ai_tasks_pending !== 1">s</span> waiting)
                </span>
            </span>
        </div>
        <button @click="resume()"
                class="px-3 py-1.5 text-sm border border-amber-400 dark:border-amber-600 rounded-md hover:bg-amber-100 dark:hover:bg-amber-800/40 transition-colors text-amber-800 dark:text-amber-300">
            Resume
        </button>
    </div>
</div>

<div x-data="{
    tasks: [],
    total: 0,
    statusFilter: '',
    page: 1,
    perPage: 50,
    loading: false,
    async load() {
        this.loading = true;
        let url = '/api/v1/admin/queue?page=' + this.page + '&per_page=' + this.perPage;
        if (this.statusFilter) url += '&status=' + this.statusFilter;
        const r = await fetch(url);
        const d = await r.json();
        this.tasks = d.tasks;
        this.total = d.total;
        this.loading = false;
    },
    async cancel(id) {
        if (!confirm('Cancel task ' + id + '?')) return;
        const r = await fetch('/api/v1/admin/queue/' + id + '/cancel', {method: 'POST'});
        if (r.ok) await this.load();
        else { const d = await r.json(); alert(d.detail); }
    },
    async retry(id) {
        const r = await fetch('/api/v1/admin/queue/' + id + '/retry', {method: 'POST'});
        if (r.ok) await this.load();
        else { const d = await r.json(); alert(d.detail); }
    },
    statusClass(s) {
        const m = {pending: 'bg-yellow-100 text-yellow-800', running: 'bg-blue-100 text-blue-800',
                   completed: 'bg-green-100 text-green-800', failed: 'bg-red-100 text-red-800',
                   cancelled: 'bg-gray-100 text-gray-600'};
        return m[s] || 'bg-gray-100 text-gray-600';
    }
}" x-init="load()">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Task Queue</h1>
        <div class="flex items-center gap-3">
            <button @click="if(confirm('Reconcile all file paths against disk?\n\nThis will:\n• Find files recorded as missing from their expected path\n• Move files to archive if they should have been moved\n• Update DB references to wherever files were found\n\nThis may take a moment.')) fetch('/api/v1/admin/maintenance/reconcile-files',{method:'POST'}).then(r=>r.json()).then(d=>alert('Reconcile complete:\n✓ OK: '+d.ok+'\n→ Path updated: '+d.path_updated+'\n📦 Moved to archive: '+d.moved+'\n✗ Missing: '+d.missing+(d.missing>0?'\n\nCheck system log for missing file details.':`\n\nAll files accounted for!`)))"
                    class="px-3 py-2 border border-orange-300 dark:border-orange-700 rounded-md text-sm hover:bg-orange-50 dark:hover:bg-orange-900/20 transition-colors text-orange-700 dark:text-orange-400">
                Reconcile Files
            </button>
            <button @click="if(confirm('Re-run classification on all processed documents?')) fetch('/api/v1/admin/processing/reclassify-all',{method:'POST'}).then(()=>alert('Reclassification scheduled'))"
                    class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-gray-700 dark:text-gray-300">
                Reclassify All
            </button>
            <button @click="if(confirm('Re-run metadata extraction on all processed documents?')) fetch('/api/v1/admin/processing/reextract-all',{method:'POST'}).then(()=>alert('Re-extraction scheduled'))"
                    class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-gray-700 dark:text-gray-300">
                Reextract All
            </button>
            <select x-model="statusFilter" @change="page=1; load()"
                    class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">All statuses</option>
                <option value="pending">Pending</option>
                <option value="running">Running</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <button @click="load()" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-gray-700 dark:text-gray-300">
                Refresh
            </button>
        </div>
    </div>

    <div class="mb-3 text-sm text-gray-500">Showing <span x-text="tasks.length"></span> of <span x-text="total"></span> tasks</div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-900">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Doc ID</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Attempts</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Created</th>
                    <th class="px-4 py-3"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                <template x-for="t in tasks" :key="t.id">
                    <tr>
                        <td class="px-4 py-3 text-sm text-gray-500" x-text="t.id"></td>
                        <td class="px-4 py-3 text-sm font-mono text-gray-900 dark:text-white" x-text="t.task_type"></td>
                        <td class="px-4 py-3">
                            <span :class="statusClass(t.status)"
                                  class="px-2 py-0.5 rounded-full text-xs font-medium"
                                  x-text="t.status"></span>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-500" x-text="t.document_id || '—'"></td>
                        <td class="px-4 py-3 text-sm text-gray-500" x-text="t.attempt_count + '/' + t.max_attempts"></td>
                        <td class="px-4 py-3 text-sm text-gray-500" x-text="fmtDateTime(t.created_at)"></td>
                        <td class="px-4 py-3 text-right space-x-2">
                            <button x-show="['pending','running'].includes(t.status)"
                                    @click="cancel(t.id)" class="text-red-600 hover:underline text-xs">Cancel</button>
                            <button x-show="['failed','cancelled'].includes(t.status)"
                                    @click="retry(t.id)" class="text-blue-600 hover:underline text-xs">Retry</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="tasks.length === 0 && !loading">
                    <td colspan="7" class="px-6 py-8 text-center text-gray-500">No tasks found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
