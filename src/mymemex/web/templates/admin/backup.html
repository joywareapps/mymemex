{% extends "base.html" %}
{% block title %}Backup — Admin — MyMemex{% endblock %}

{% block content %}
<div x-data="{
    backups: [],
    total: 0,
    running: false,
    page: 1,
    async load() {
        const r = await fetch('/api/v1/admin/backup/history?page=' + this.page + '&per_page=20');
        const d = await r.json();
        this.backups = d.backups;
        this.total = d.total;
    },
    async runNow() {
        if (this.running) return;
        this.running = true;
        const r = await fetch('/api/v1/admin/backup/run', {method: 'POST'});
        this.running = false;
        if (r.ok) {
            $dispatch('toast', {type: 'success', message: 'Backup started'});
            await this.load();
        } else {
            const d = await r.json();
            alert(d.detail || 'Backup failed');
        }
    },
    download(id) {
        window.location.href = '/api/v1/admin/backup/' + id + '/download';
    },
    statusClass(s) {
        return s === 'success' ? 'bg-green-100 text-green-800' :
               s === 'failed' ? 'bg-red-100 text-red-800' :
               'bg-yellow-100 text-yellow-800';
    },
    formatSize(bytes) {
        if (!bytes) return '—';
        const kb = bytes / 1024;
        return kb < 1024 ? kb.toFixed(0) + ' KB' : (kb / 1024).toFixed(1) + ' MB';
    }
}" x-init="load()">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Backup</h1>
        <button @click="runNow()" :disabled="running"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 text-sm transition-colors">
            <span x-show="!running">Backup Now</span>
            <span x-show="running">Running…</span>
        </button>
    </div>

    <div class="mb-4">
        <a href="/ui/admin/settings" class="text-blue-600 text-sm hover:underline">
            ↗ Configure backup schedule and destination in Settings → Backup
        </a>
    </div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
            <h2 class="font-semibold text-gray-900 dark:text-white">Backup History</h2>
        </div>
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-900">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Filename</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Size</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Created</th>
                    <th class="px-6 py-3"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                <template x-for="b in backups" :key="b.id">
                    <tr>
                        <td class="px-6 py-4 text-sm font-mono text-gray-900 dark:text-white" x-text="b.filename"></td>
                        <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400" x-text="formatSize(b.size_bytes)"></td>
                        <td class="px-6 py-4">
                            <span :class="statusClass(b.status)"
                                  class="px-2 py-1 rounded-full text-xs font-medium capitalize"
                                  x-text="b.status"></span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400"
                            x-text="new Date(b.created_at).toLocaleString()"></td>
                        <td class="px-6 py-4 text-right">
                            <button x-show="b.status === 'success'" @click="download(b.id)"
                                    class="text-blue-600 hover:underline text-sm">Download</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="backups.length === 0">
                    <td colspan="5" class="px-6 py-8 text-center text-gray-500">No backups yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
