<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Librarian{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/ui/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/ui/static/css/style.css">
</head>
<body class="h-full" x-data="{ toast: null }">

<!-- Navigation -->
<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-14">
            <div class="flex items-center space-x-8">
                <a href="/ui/" class="text-lg font-semibold text-gray-900">Librarian</a>
                <div class="hidden sm:flex space-x-4">
                    <a href="/ui/" class="px-3 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 rounded-md hover:bg-gray-100">Documents</a>
                    <a href="/ui/tags" class="px-3 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 rounded-md hover:bg-gray-100">Tags</a>
                    <a href="/ui/upload" class="px-3 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 rounded-md hover:bg-gray-100">Upload</a>
                </div>
            </div>
            <div class="flex items-center">
                <form action="/ui/search" method="get" class="flex">
                    <input type="text" name="q" placeholder="Search documents..."
                           class="w-64 px-3 py-1.5 text-sm border border-gray-300 rounded-l-md focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                    <button type="submit" class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-r-md hover:bg-blue-700">
                        Search
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    {% block content %}{% endblock %}
</main>

<!-- Toast Notification -->
<div x-show="toast" x-transition
     class="fixed top-4 right-4 z-50 px-4 py-3 rounded-md shadow-lg text-sm toast-enter"
     :class="toast?.type === 'error' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'"
     x-text="toast?.message"
     @click="toast = null">
</div>

{% block scripts %}{% endblock %}

</body>
</html>
