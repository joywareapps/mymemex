# Add this to your OpenClaw config (~/.openclaw/config.yaml)

mcp:
  servers:
    mymemex:
      # Option 1: stdio transport (recommended for local)
      transport: stdio
      command: mymemex
      args: ["mcp", "serve"]

      # Option 2: HTTP transport (for remote access)
      # transport: http
      # url: http://your-server:8002/mcp
      # api_key: ${MYMEMEX_MCP_KEY}   # only if MCP auth token is enabled
