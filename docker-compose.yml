version: "3.8"

services:
  mymemex:
    image: ghcr.io/joywareapps/mymemex:latest
    build: .
    container_name: mymemex
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - mymemex-data:/var/lib/mymemex
      - ${DOCUMENTS_PATH:-~/Documents}:/mnt/documents:ro
    environment:
      - MYMEMEX_CONFIG=/app/config/config.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  mymemex-data:
